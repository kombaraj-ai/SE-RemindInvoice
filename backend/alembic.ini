# A generic, single database configuration.
# Alembic reads this file when you run `alembic` from the backend/ directory.

[alembic]
# Path to the alembic migrations directory (relative to this file)
script_location = alembic

# Template used to generate migration file names.
# %(rev)s   — short revision hash
# %(slug)s  — message slug
# %(year)d, %(month).2d, %(day).2d — date parts
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# The timezone to use for date-based file names. Defaults to UTC.
timezone = UTC

# Truncate the slug to this length (avoids very long filenames)
truncate_slug_length = 40

# DO NOT hard-code DATABASE_URL here — it is injected by env.py from the
# environment variable or .env file.  This placeholder is required by Alembic
# to parse the ini; env.py overrides it at runtime.
sqlalchemy.url = postgresql://user:pass@localhost:5432/remindinvoice

# -----------------------------------------------------------------
# Logging configuration
# -----------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
